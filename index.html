<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girl Scout Code Camp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gs-green: #00ae58;
      --gs-dark-green: #006838;
      --gs-light-green: #e8f5e9;
      --gs-gold: #ffc107;
      --gs-brown: #5d4037;
      --gs-pink: #e91e63;
      --gs-bg: #f5f0e8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gs-bg);
      color: #333;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--gs-dark-green), var(--gs-green));
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 .tent { font-size: 1.8rem; }

    .badge-count {
      background: var(--gs-gold);
      color: var(--gs-brown);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    /* Challenge Navigation */
    .challenge-nav {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: white;
      border-bottom: 3px solid var(--gs-green);
      overflow-x: auto;
    }

    .challenge-btn {
      padding: 8px 16px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: all 0.2s;
      font-weight: 500;
    }

    .challenge-btn:hover { border-color: var(--gs-green); background: var(--gs-light-green); }
    .challenge-btn.active { background: var(--gs-green); color: white; border-color: var(--gs-green); }
    .challenge-btn.completed { background: var(--gs-gold); border-color: var(--gs-gold); color: var(--gs-brown); }
    .challenge-btn.completed::after { content: " \2713"; }

    /* Main Layout */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 110px);
    }

    /* Instructions Panel */
    .instructions {
      grid-column: 1 / -1;
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #ddd;
    }

    .instructions h2 {
      color: var(--gs-dark-green);
      font-size: 1.1rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .instructions p { font-size: 0.95rem; line-height: 1.5; color: #555; }
    .instructions code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--gs-pink);
    }

    .hint-btn {
      margin-top: 8px;
      background: none;
      border: 1px dashed var(--gs-green);
      color: var(--gs-green);
      padding: 4px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .hint { display: none; margin-top: 8px; padding: 10px; background: #fff9c4; border-radius: 8px; font-size: 0.85rem; }
    .hint.show { display: block; }

    /* Editor */
    .editor-panel {
      border-right: 3px solid var(--gs-green);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 8px 16px;
      background: #1e1e1e;
      color: #75715e;
      font-size: 0.8rem;
      font-family: monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .run-btn {
      background: var(--gs-green);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .run-btn:hover { background: var(--gs-dark-green); }

    textarea.code-editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #272822;
      color: #f8f8f2;
      caret-color: #f8f8f0;
      tab-size: 2;
      outline: none;
    }

    /* Preview */
    .preview-panel { display: flex; flex-direction: column; background: white; }

    .preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      background: white;
    }

    /* Check button */
    .check-row {
      padding: 8px 16px;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .check-btn {
      background: var(--gs-gold);
      color: var(--gs-brown);
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .check-btn:hover { filter: brightness(1.1); }

    .check-result {
      font-size: 0.9rem;
      font-weight: 500;
    }
    .check-result.pass { color: var(--gs-green); }
    .check-result.fail { color: #e53935; }

    /* Celebration overlay */
    .celebration {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .celebration.show { display: flex; }

    .celebration-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      animation: popIn 0.4s ease;
    }

    .celebration-card .badge-icon { font-size: 4rem; }
    .celebration-card h2 { color: var(--gs-dark-green); margin: 12px 0 8px; }
    .celebration-card p { color: #666; margin-bottom: 20px; }

    .next-btn {
      background: var(--gs-green);
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      z-index: 101;
      pointer-events: none;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr 1fr; }
      .editor-panel { border-right: none; border-bottom: 3px solid var(--gs-green); min-height: 250px; }
      .preview-panel { min-height: 250px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><span class="tent">&#9978;</span> Girl Scout Code Camp</h1>
  <div class="badge-count" id="badgeCount">Badges: 0 / 5</div>
</div>

<div class="challenge-nav" id="challengeNav"></div>

<div class="main">
  <div class="instructions" id="instructions"></div>

  <div class="editor-panel">
    <div class="panel-header">
      <span>&#128221; Your Code</span>
      <button class="run-btn" onclick="runCode()">&#9654; Run Code</button>
    </div>
    <textarea class="code-editor" id="editor" spellcheck="false"></textarea>
  </div>

  <div class="preview-panel">
    <div class="panel-header"><span>&#127912; Preview</span></div>
    <iframe class="preview-frame" id="preview"></iframe>
    <div class="check-row">
      <button class="check-btn" onclick="checkChallenge()">&#11088; Check My Work!</button>
      <span class="check-result" id="checkResult"></span>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-card">
    <div class="badge-icon" id="celebBadge"></div>
    <h2 id="celebTitle">Badge Earned!</h2>
    <p id="celebMsg"></p>
    <button class="next-btn" onclick="nextChallenge()">Next Challenge &rarr;</button>
  </div>
</div>

<script>
// Helper: check that code has proper HTML document structure
function checkStructure(code) {
  const lower = code.toLowerCase();
  if (!lower.includes('<!doctype html>')) return "Missing <!DOCTYPE html> at the very top of your code!";
  if (!lower.includes('<html')) return "Missing <html> tag! Wrap everything in <html>...</html>";
  if (!lower.includes('</html>')) return "Missing closing </html> tag!";
  if (!lower.includes('<head>')) return "Missing <head> section! Add <head>...</head> inside <html>";
  if (!lower.includes('</head>')) return "Missing closing </head> tag!";
  if (!lower.includes('<title>')) return "Missing <title> tag inside <head>! Every page needs a title.";
  if (!lower.includes('</title>')) return "Missing closing </title> tag!";
  if (!lower.includes('<body')) return "Missing <body> tag! Add <body>...</body> after </head>";
  if (!lower.includes('</body>')) return "Missing closing </body> tag!";
  return null;
}

const challenges = [
  {
    title: "My First Web Page",
    icon: "&#127793;",
    badge: "&#127793;",
    badgeName: "Seedling Badge",
    description: `Every website starts with a proper HTML document! Follow the comments in the code to build your first complete web page. You need a <code>&lt;!DOCTYPE html&gt;</code>, <code>&lt;html&gt;</code>, <code>&lt;head&gt;</code> with a <code>&lt;title&gt;</code>, and a <code>&lt;body&gt;</code> with an <code>&lt;h1&gt;</code> heading and a <code>&lt;p&gt;</code> paragraph about yourself.`,
    hint: `Replace the placeholder text inside the <code>&lt;title&gt;</code>, <code>&lt;h1&gt;</code>, and <code>&lt;p&gt;</code> tags with your own words. Don't delete any tags!`,
    starter: `<!DOCTYPE html>
<html>
  <head>
    <!-- STEP 1: Change the title between the <title> tags -->
    <title>My Page</title>
  </head>
  <body>
    <!-- STEP 2: Change the heading text to: Hello Girl Scouts! -->
    <h1>Change me!</h1>

    <!-- STEP 3: Write a sentence about yourself in this paragraph -->
    <p>Tell us something about yourself here!</p>
  </body>
</html>`,
    check(doc, code) {
      const err = checkStructure(code);
      if (err) return err;
      const h1 = doc.querySelector('h1');
      const p = doc.querySelector('p');
      const title = doc.querySelector('title');
      if (!title || title.textContent.trim().length < 2) return "Add a title inside your <title> tag!";
      if (!h1) return "Add a heading using <h1> tags inside <body>!";
      if (h1.textContent.trim() === 'Change me!') return "Change the <h1> heading text — make it your own!";
      if (!p) return "Add a paragraph using <p> tags inside <body>!";
      if (p.textContent.trim() === 'Tell us something about yourself here!' || p.textContent.trim().length < 5) return "Write something about yourself in the <p> paragraph!";
      return true;
    }
  },
  {
    title: "Cookie Shop List",
    icon: "&#127850;",
    badge: "&#127850;",
    badgeName: "Cookie Badge",
    description: `Build a cookie menu page! You need a complete HTML document with a heading, and a <code>&lt;ul&gt;</code> (unordered list) containing at least <strong>3</strong> cookie flavors as <code>&lt;li&gt;</code> (list item) elements.`,
    hint: `Add more <code>&lt;li&gt;Cookie Name&lt;/li&gt;</code> lines inside the <code>&lt;ul&gt;</code> to get at least 3 cookies in your list.`,
    starter: `<!DOCTYPE html>
<html>
  <head>
    <!-- STEP 1: Give your cookie page a title -->
    <title>Cookie Shop</title>
  </head>
  <body>
    <!-- STEP 2: Add a heading for your cookie shop -->
    <h1>Our Cookie Flavors</h1>

    <!-- STEP 3: Add at least 3 cookies to this list -->
    <!-- Each cookie goes inside <li> tags like this: <li>Cookie Name</li> -->
    <ul>
      <li>Thin Mints</li>
      <!-- Add 2 or more cookies below! -->

    </ul>
  </body>
</html>`,
    check(doc, code) {
      const err = checkStructure(code);
      if (err) return err;
      const h1 = doc.querySelector('h1');
      const lis = doc.querySelectorAll('li');
      if (!h1) return "Add a heading inside <body>!";
      if (lis.length < 3) return `You have ${lis.length} cookie(s) — add at least 3! Add more <li> tags.`;
      return true;
    }
  },
  {
    title: "Colorful Campsite",
    icon: "&#127981;",
    badge: "&#127981;",
    badgeName: "Campfire Badge",
    description: `Now let's add COLOR with CSS! Inside the <code>&lt;head&gt;</code>, use a <code>&lt;style&gt;</code> tag to change the page's <code>background-color</code> and the heading's <code>color</code>. The <code>&lt;style&gt;</code> tag goes inside <code>&lt;head&gt;</code>, not <code>&lt;body&gt;</code>!`,
    hint: `Replace <code>white</code> with a color like <code>lightgreen</code>, <code>peachpuff</code>, or <code>lightyellow</code>. Replace <code>black</code> with <code>darkgreen</code>, <code>brown</code>, or <code>purple</code>.`,
    starter: `<!DOCTYPE html>
<html>
  <head>
    <title>My Campsite</title>

    <!-- CSS (styles) go inside <style> tags in the <head> section -->
    <style>
      /* STEP 1: Change the background-color from white to a fun color */
      /* Try: lightgreen, peachpuff, lightyellow, lavender, lightblue */
      body {
        background-color: white;
      }

      /* STEP 2: Change the heading color from black to something else */
      /* Try: darkgreen, brown, purple, darkred, navy */
      h1 {
        color: black;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to Camp!</h1>
    <p>The best campsite in the forest.</p>
  </body>
</html>`,
    check(doc, code) {
      const err = checkStructure(code);
      if (err) return err;
      const body = doc.body;
      const h1 = doc.querySelector('h1');
      if (!h1) return "Add a heading inside <body>!";
      if (!doc.querySelector('style')) return "Add a <style> tag inside <head> for your CSS!";
      const bodyBg = getComputedStyle(body).backgroundColor;
      const h1Color = getComputedStyle(h1).color;
      if (bodyBg === 'rgba(0, 0, 0, 0)' || bodyBg === 'rgb(255, 255, 255)') return "Change the background-color to something other than white!";
      if (h1Color === 'rgb(0, 0, 0)') return "Change the h1 color to something other than black!";
      return true;
    }
  },
  {
    title: "Badge Designer",
    icon: "&#129351;",
    badge: "&#129351;",
    badgeName: "Designer Badge",
    description: `Design a circular badge using CSS! You need a <code>&lt;div&gt;</code> element styled with: <code>border-radius: 50%</code> (makes circles!), a <code>background-color</code>, and centered text. Follow the comments step by step.`,
    hint: `Remove the <code>/* </code> and <code> */</code> around each CSS line to "uncomment" it and make it work. For example, change <code>/* border-radius: 50%; */</code> to just <code>border-radius: 50%;</code>`,
    starter: `<!DOCTYPE html>
<html>
  <head>
    <title>My Badge</title>
    <style>
      .badge {
        width: 150px;
        height: 150px;
        font-size: 20px;
        font-weight: bold;

        /* STEP 1: Uncomment the line below to make it a circle */
        /* (Remove the /* and */ around it) */
        /* border-radius: 50%; */

        /* STEP 2: Uncomment and pick a background color */
        /* Try: gold, tomato, dodgerblue, mediumseagreen */
        /* background-color: gold; */

        /* STEP 3: Uncomment these to center the text */
        /* text-align: center; */
        /* line-height: 150px; */
      }
    </style>
  </head>
  <body>
    <!-- STEP 4: Change the text inside the badge to your own badge name! -->
    <div class="badge">Coder!</div>
  </body>
</html>`,
    check(doc, code) {
      const err = checkStructure(code);
      if (err) return err;
      const badge = doc.querySelector('.badge');
      if (!badge) return "Keep the <div class=\"badge\"> element in your <body>!";
      const style = getComputedStyle(badge);
      if (style.borderRadius !== '50%' && !style.borderRadius.includes('75px')) return "Uncomment border-radius: 50%; to make it a circle!";
      const bg = style.backgroundColor;
      if (bg === 'rgba(0, 0, 0, 0)' || bg === 'rgb(255, 255, 255)' || bg === 'transparent') return "Uncomment background-color and pick a color!";
      if (style.textAlign !== 'center') return "Uncomment text-align: center; to center your text!";
      return true;
    }
  },
  {
    title: "Troop Homepage",
    icon: "&#11088;",
    badge: "&#11088;",
    badgeName: "Star Badge",
    description: `Final challenge! Build a complete troop homepage using everything you've learned. You need: a <code>&lt;title&gt;</code>, CSS <code>&lt;style&gt;</code> with at least one color change, an <code>&lt;h1&gt;</code> with your troop name, a <code>&lt;p&gt;</code> about your troop, and a <code>&lt;ul&gt;</code> list with at least 3 activities. Make it yours!`,
    hint: `Follow each STEP comment in order. Pick your own colors, troop name, description, and activities. Get creative — this is YOUR page!`,
    starter: `<!DOCTYPE html>
<html>
  <head>
    <!-- STEP 1: Give your troop page a title -->
    <title>Our Troop</title>

    <style>
      /* STEP 2: Pick a background color for the whole page */
      body {
        font-family: Arial, sans-serif;
        background-color: white;
      }

      /* STEP 3: Style your troop name heading with a color */
      h1 {
        color: black;
      }
    </style>
  </head>
  <body>
    <!-- STEP 4: Change this to YOUR troop name -->
    <h1>Troop Name Here</h1>

    <!-- STEP 5: Write 1-2 sentences about your troop -->
    <p>Write about your troop here!</p>

    <h2>Our Favorite Activities</h2>
    <!-- STEP 6: Add at least 3 activities your troop loves -->
    <ul>
      <li>Camping</li>
      <!-- Add 2 more activities below! -->

    </ul>
  </body>
</html>`,
    check(doc, code) {
      const err = checkStructure(code);
      if (err) return err;
      const h1 = doc.querySelector('h1');
      const p = doc.querySelector('p');
      const lis = doc.querySelectorAll('li');
      const style = doc.querySelector('style');
      if (!h1) return "Add an <h1> heading with your troop name inside <body>!";
      if (h1.textContent.trim() === 'Troop Name Here') return "Change the <h1> to your actual troop name!";
      if (!p) return "Add a <p> paragraph about your troop!";
      if (p.textContent.trim() === 'Write about your troop here!' || p.textContent.trim().length < 10) return "Write a real description about your troop in the <p> tag!";
      if (lis.length < 3) return `You have ${lis.length} activit${lis.length === 1 ? 'y' : 'ies'} — add at least 3!`;
      if (!style) return "Add a <style> tag in <head> with some CSS!";
      const body = doc.body;
      const bodyBg = getComputedStyle(body).backgroundColor;
      const h1Color = getComputedStyle(h1).color;
      if ((bodyBg === 'rgba(0, 0, 0, 0)' || bodyBg === 'rgb(255, 255, 255)') && h1Color === 'rgb(0, 0, 0)') return "Change at least one color in your CSS — background-color or h1 color!";
      return true;
    }
  }
];

// --- LocalStorage persistence ---
const STORAGE_KEY = 'gs-code-camp-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveState() {
  const state = {
    current,
    completed: [...completed],
    code: savedCode
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let savedCode = {}; // { challengeIndex: "code string" }
let current = 0;
let completed = new Set();

// Restore from localStorage
const _saved = loadState();
if (_saved) {
  current = _saved.current || 0;
  completed = new Set(_saved.completed || []);
  savedCode = _saved.code || {};
}

function renderNav() {
  const nav = document.getElementById('challengeNav');
  nav.innerHTML = challenges.map((c, i) =>
    `<button class="challenge-btn ${i === current ? 'active' : ''} ${completed.has(i) ? 'completed' : ''}" onclick="goTo(${i})">
      ${c.icon} ${c.title}
    </button>`
  ).join('');
}

function renderChallenge() {
  const c = challenges[current];
  document.getElementById('instructions').innerHTML = `
    <h2>${c.icon} Challenge ${current + 1}: ${c.title}</h2>
    <p>${c.description}</p>
    <button class="hint-btn" onclick="toggleHint()">&#128161; Need a hint?</button>
    <div class="hint" id="hint">${c.hint}</div>
  `;
  document.getElementById('editor').value = savedCode[current] !== undefined ? savedCode[current] : c.starter;
  document.getElementById('checkResult').textContent = '';
  document.getElementById('checkResult').className = 'check-result';
  document.getElementById('badgeCount').textContent = `Badges: ${completed.size} / ${challenges.length}`;
  renderNav();
  runCode();
}

function goTo(i) {
  // Save current code before switching
  savedCode[current] = document.getElementById('editor').value;
  current = i;
  saveState();
  renderChallenge();
}

function toggleHint() {
  document.getElementById('hint').classList.toggle('show');
}

function runCode() {
  const code = document.getElementById('editor').value;
  const preview = document.getElementById('preview');
  const doc = preview.contentDocument || preview.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}

function checkChallenge() {
  const preview = document.getElementById('preview');
  const doc = preview.contentDocument || preview.contentWindow.document;
  const code = document.getElementById('editor').value;
  const result = challenges[current].check(doc, code);
  const el = document.getElementById('checkResult');

  if (result === true) {
    el.textContent = "Perfect!";
    el.className = 'check-result pass';
    if (!completed.has(current)) {
      completed.add(current);
      saveState();
      document.getElementById('badgeCount').textContent = `Badges: ${completed.size} / ${challenges.length}`;
      renderNav();
      showCelebration();
    }
  } else {
    el.textContent = result;
    el.className = 'check-result fail';
  }
}

function showCelebration() {
  const c = challenges[current];
  document.getElementById('celebBadge').innerHTML = c.badge;
  document.getElementById('celebTitle').textContent = `${c.badgeName} Earned!`;
  document.getElementById('celebMsg').textContent = `Amazing work! You completed "${c.title}"!`;
  document.getElementById('celebration').classList.add('show');
  spawnConfetti();
}

function nextChallenge() {
  document.getElementById('celebration').classList.remove('show');
  if (current < challenges.length - 1) {
    current++;
    renderChallenge();
  }
}

function spawnConfetti() {
  const colors = ['#00ae58', '#ffc107', '#e91e63', '#2196f3', '#ff9800', '#9c27b0'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);

    const duration = 1500 + Math.random() * 2000;
    const drift = (Math.random() - 0.5) * 200;

    piece.animate([
      { transform: 'translateY(0) translateX(0) rotate(0deg)', opacity: 1 },
      { transform: `translateY(100vh) translateX(${drift}px) rotate(${360 + Math.random()*360}deg)`, opacity: 0 }
    ], { duration, easing: 'ease-in' }).onfinish = () => piece.remove();
  }
}

// Auto-run on typing (debounced) + save
let timeout;
document.getElementById('editor').addEventListener('input', () => {
  savedCode[current] = document.getElementById('editor').value;
  saveState();
  clearTimeout(timeout);
  timeout = setTimeout(runCode, 500);
});

// Tab key in editor
document.getElementById('editor').addEventListener('keydown', (e) => {
  const ta = e.target;
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = ta.selectionStart;
    ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = start + 2;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const start = ta.selectionStart;
    const before = ta.value.substring(0, start);
    const after = ta.value.substring(ta.selectionEnd);
    // Get the indentation of the current line
    const currentLine = before.split('\n').pop();
    const indent = currentLine.match(/^(\s*)/)[1];
    const insert = '\n' + indent;
    ta.value = before + insert + after;
    ta.selectionStart = ta.selectionEnd = start + insert.length;
    // Trigger input event for auto-save and preview
    ta.dispatchEvent(new Event('input'));
  }
});

// Init
renderChallenge();
</script>
